name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: emp_rewards
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Create databases
        run: |
          mysql -h 127.0.0.1 -u root -psecret -e "CREATE DATABASE IF NOT EXISTS empcloud;"
          mysql -h 127.0.0.1 -u root -psecret -e "CREATE DATABASE IF NOT EXISTS emp_rewards;"
      - run: pnpm build
      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: secret
          DB_NAME: emp_rewards
          EMPCLOUD_DB_HOST: 127.0.0.1
          EMPCLOUD_DB_PORT: 3306
          EMPCLOUD_DB_USER: root
          EMPCLOUD_DB_PASSWORD: secret
          EMPCLOUD_DB_NAME: empcloud
          REDIS_HOST: 127.0.0.1
          NODE_ENV: test
          JWT_SECRET: test-secret
        run: pnpm test
